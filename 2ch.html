<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>当選履歴</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#222;
color:white;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:auto;
margin-top:30px;
}

.input-box{
background:#333;
padding:20px;
border-radius:10px;
}

input,select,textarea{
width:90%;
font-size:20px;
margin-top:10px;
padding:10px;
}

button{
width:90%;
margin-top:15px;
padding:15px;
font-size:22px;
}

.record{
background:#444;
margin-top:10px;
padding:15px;
border-radius:10px;
text-align:left;
}

</style>
</head>

<body>

<h1>当選履歴</h1>

<div class="container">

<div class="input-box">

<input id="spin" type="number" placeholder="回転数">

<select id="role">
<option value="">当選役</option>
<option>REG</option>
<option>赤BIG</option>
<option>青BIG</option>
<option>黒BIG</option>
<option>異色BIG</option>
</select>

<div id="triggerBox"></div>

<button onclick="addTrigger()">契機追加</button>

<textarea id="memo" placeholder="メモ"></textarea>

<button onclick="addRecord()">登録</button>

</div>

<div id="list"></div>

</div>

<script>

const API_URL = "ここにGASのURL"

let records=[]

const triggerOptions=[
"単独","一枚役A","一枚役B","一枚役C","一枚役D",
"共通１枚役","ベル","リプレイ",
"チェリー","スイカ","特リプ"
]

function addTrigger(value=""){

const box=document.getElementById("triggerBox")

const select=document.createElement("select")

let html=`<option value="">契機</option>`

triggerOptions.forEach(t=>{
html+=`<option ${t===value?"selected":""}>${t}</option>`
})

select.innerHTML=html
box.appendChild(select)

}

function getTriggers(){

return [...document.querySelectorAll("#triggerBox select")]
.map(s=>s.value)
.filter(v=>v)

}

function clearInput(){

document.getElementById("spin").value=""
document.getElementById("role").value=""
document.getElementById("memo").value=""
document.getElementById("triggerBox").innerHTML=""

}

function addRecord(){

const spin=document.getElementById("spin").value
const role=document.getElementById("role").value
const memo=document.getElementById("memo").value
const triggers=getTriggers()

if(!spin||!role){
alert("回転数と役は必須")
return
}

const data={
spin:Number(spin),
role:role,
triggers:triggers,
memo:memo
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(()=>{

clearInput()
loadRecords()

})

}

function loadRecords(){

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

records=data.map(r=>({
spin:r[1],
role:r[2],
triggers:r[3]?r[3].split(","):[],
memo:r[4]
}))

render()

})

}

function render(){

const list=document.getElementById("list")
list.innerHTML=""

records.forEach(r=>{

const div=document.createElement("div")
div.className="record"

div.innerHTML=`

回転数：${r.spin}<br>
当選役：${r.role}<br>
契機：${r.triggers.join(",")}<br>
メモ：${r.memo}

`

list.appendChild(div)

})

}

window.onload=loadRecords

</script>

</body>
</html>
