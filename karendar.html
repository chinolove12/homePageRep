<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>月間カレンダー</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:sans-serif;
background:url("kame.jpg") no-repeat center center/cover;
height:100vh;
color:white;
text-align:center;
}

h1{
margin-top:40px;
font-size:40px;
text-shadow:0 2px 4px black;
}

.calendar-box{
width:90%;
max-width:700px;
margin:40px auto;
background:rgba(255,255,255,0.92);
color:#333;
border-radius:16px;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
border:1px solid #ccc;
padding:6px;
height:70px;
vertical-align:top;
}

.sun{color:red;}
.sat{color:blue;}

.profit{
font-size:12px;
margin-top:4px;
}

.plus{color:red;}
.minus{color:blue;}

canvas{
background:white;
border-radius:12px;
margin-top:40px;
}

</style>
</head>

<body>

<h1>月間カレンダー</h1>

<div class="calendar-box">
<div id="title"></div>
<table id="calendar"></table>

<canvas id="chart" height="200"></canvas>

</div>

<script>

const API="GASのURL";

let monthlyData={};

fetch(API)
.then(r=>r.json())
.then(data=>{

data.forEach(d=>{
monthlyData[d.date]=d.diff;
});

drawCalendar();
drawGraph();

});


function drawCalendar(){

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();

document.getElementById("title").textContent=`${year}年 ${month+1}月`;

const first=new Date(year,month,1);
const last=new Date(year,month+1,0);

const startWeek=first.getDay();
const totalDays=last.getDate();

const table=document.getElementById("calendar");

let html="<tr>";
const weeks=["日","月","火","水","木","金","土"];

weeks.forEach((d,i)=>{

if(i===0) html+=`<th class="sun">${d}</th>`;
else if(i===6) html+=`<th class="sat">${d}</th>`;
else html+=`<th>${d}</th>`;

});

html+="</tr><tr>";

for(let i=0;i<startWeek;i++) html+="<td></td>";

for(let d=1; d<=totalDays; d++){

const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const diff=monthlyData[dateStr];

let profitHTML="";

if(diff!==undefined){

const cls=diff>=0?"plus":"minus";
const sign=diff>0?"+":"";

profitHTML=`<div class="profit ${cls}">${sign}${diff}</div>`;

}

const w=(startWeek+d-1)%7;

let cls="";
if(w===0) cls="sun";
if(w===6) cls="sat";

html+=`<td class="${cls}">${d}${profitHTML}</td>`;

if(w===6 && d!==totalDays) html+="</tr><tr>";

}

html+="</tr>";
table.innerHTML=html;

}


function drawGraph(){

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth()+1;

const labels=[];
const values=[];

Object.keys(monthlyData).forEach(d=>{

if(d.startsWith(`${year}-${String(month).padStart(2,"0")}`)){

labels.push(d.slice(8));
values.push(monthlyData[d]);

}

});

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"差枚",
data:values
}]
}
});

}

</script>

</body>
</html>
