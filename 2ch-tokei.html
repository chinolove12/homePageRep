<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>ボーナス契機統計</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
padding:40px;
}

h1{
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px 16px;
text-align:center;
font-size:16px;
}

th{
background:#333;
color:white;
}

tr:nth-child(even){
background:#f7f7f7;
}

.theory{
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<h1>契機別ボーナス確率（実践値）</h1>

<table id="matrix"></table>

<script>

const API="https://script.google.com/macros/s/AKfycbypgrprmoFKKr7cCxYn51NhEg9C5D-kwEhQhzBDrwtL5vFxc_gqWB1DnohvYssJUHA/exec?mode=matrix"

const flags=[
"単独",
"一枚役A",
"一枚役B",
"一枚役C",
"一枚役D",
"共通１枚役",
"ベル",
"リプレイ",
"チェリー",
"スイカ",
"特リプ"
]

const bonus=[
"REG",
"赤BIG",
"青BIG",
"黒BIG",
"異色"
]

/* ===== 理論値 ===== */

const theory = {

"単独":{
"REG":"",
"赤BIG":"",
"青BIG":"1/4096",
"黒BIG":"1/8192",
"異色":""
},

"一枚役A":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"1/4096",
"異色":""
},

"一枚役B":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
},

"一枚役C":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
},

"一枚役D":{
"REG":"",
"赤BIG":"",
"青BIG":"1/4096",
"黒BIG":"1/4096",
"異色":""
},

"共通１枚役":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
},

"ベル":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
},

"リプレイ":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
},

"チェリー":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
},

"スイカ":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
},

"特リプ":{
"REG":"",
"赤BIG":"",
"青BIG":"",
"黒BIG":"",
"異色":""
}

}


/* ===== 実践値取得 ===== */

fetch(API)
.then(r=>r.json())
.then(data=>{

const table=document.getElementById("matrix")

let html="<tr><th>フラグ</th>"

bonus.forEach(b=>{
html+="<th>"+b+"</th>"
})

html+="</tr>"


/* ===== グループ ===== */

const blueGroup=
data.count["単独"]["青BIG"]+
data.count["一枚役D"]["青BIG"]

const blackGroup=
data.count["単独"]["黒BIG"]+
data.count["一枚役A"]["黒BIG"]+
data.count["一枚役B"]["黒BIG"]+
data.count["一枚役D"]["黒BIG"]


flags.forEach(f=>{

html+="<tr>"
html+="<td>"+f+"</td>"

bonus.forEach(b=>{

let c=data.count?.[f]?.[b]??0


if(b==="青BIG"&&(f==="単独"||f==="一枚役D")){
c=blueGroup
}

if(
b==="黒BIG"&&
(
f==="単独"||
f==="一枚役A"||
f==="一枚役B"||
f==="一枚役D"
)
){
c=blackGroup
}

let actual="-"

if(c!==0){
const prob=Math.round(data.spin/c)
actual="1/"+prob
}

const t=theory[f][b]||""

html+=`
<td>
<div>${actual}</div>
<div class="theory">${t?`(${t})`:""}</div>
</td>
`

})

html+="</tr>"

})

table.innerHTML=html

})

</script>

</body>

</html>
